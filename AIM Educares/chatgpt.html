<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<style>
		/* Desktop styles */
		.container {
			max-width: 960px;
			margin: 0 auto;
			padding: 20px;
			background-color: #f0f0f0;
		}
		
		/* Tablet styles */
		@media (max-width: 768px) {
			.container {
				max-width: 720px;
			}
		}
		
		/* Mobile styles */
		@media (max-width: 480px) {
			.container {
				max-width: 100%;
				padding: 10px;
			}
		}
		
		img {
			max-width: 100%;
			height: auto;
		}
		
		h1 {
			font-size: 2.5rem;
		}
		
		p {
			font-size: 1.2rem;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>Responsive Webpage</h1>
		<p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nulla fermentum lorem quis lacus accumsan, eu eleifend lectus laoreet. Proin bibendum libero in quam blandit, et viverra nisi malesuada.</p>
		<img src="image.jpg" alt="Responsive Image">
	</div>
</body>
</html>
