<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Admin Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 200px;
      height: 100%;
      background: #2c3e50;
      color: #fff;
      padding-top: 20px;
      transition: width 0.3s;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
    }

    .sidebar ul li {
      padding: 15px;
      text-align: center;
    }

    .sidebar ul li a {
      color: white;
      text-decoration: none;
      display: block;
      transition: background 0.3s;
    }

    .sidebar ul li a:hover {
      background: #1abc9c;
    }

    /* Main Content */
    .main-content {
      margin-left: 200px;
      padding: 20px;
      transition: margin-left 0.3s;
    }

    header {
      background: #fff;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .toggle-btn {
      font-size: 20px;
      cursor: pointer;
      border: none;
      background: none;
    }

    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
      font-weight: bold;
    }

    /* Collapsed Sidebar */
    .collapsed {
      width: 60px;
    }

    .collapsed ~ .main-content {
      margin-left: 60px;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <h2>Admin</h2>
    <ul>
      <li><a href="#">Dashboard</a></li>
      <li><a href="#">Students</a></li>
      <li><a href="#">Teachers</a></li>
      <li><a href="#">Reports</a></li>
      <li><a href="#">Settings</a></li>
      <li><a href="#">Logout</a></li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main-content" id="mainContent">
    <header>
      <h1>Welcome, Admin</h1>
      <button class="toggle-btn" id="toggleBtn">☰</button>
    </header>

    <section class="cards">
      <div class="card">Students</div>
      <div class="card">Teachers</div>
      <div class="card">Attendance</div>
      <div class="card">Reports</div>
    </section>
  </div>


  

  <script>
    // Sidebar Toggle
    const toggleBtn = document.getElementById("toggleBtn");
    const sidebar = document.getElementById("sidebar");
    const mainContent = document.getElementById("mainContent");

    toggleBtn.addEventListener("click", () => {
      sidebar.classList.toggle("collapsed");
      mainContent.classList.toggle("collapsed");
    });
  </script>

</body>
</html>
